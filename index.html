<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- INTRO -->
<div id="introScreen">
  <div class="intro-content">

    <img 
      class="pokemon-logo"
      src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pokémon_logo.svg"
      alt="Pokemon Logo"
    />

    <h1 class="intro-title">POKÉDEX</h1>
    <p class="intro-subtitle">Digital Monster Encyclopedia</p>

    <button id="startBtn">START</button>

  </div>
</div>

<!-- POKEDEX -->
<div class="pokedex">

  <div class="left-panel">

    <div class="top-lights">
      <div class="big-light"></div>
      <div class="small-lights">
        <span class="red"></span>
        <span class="yellow"></span>
        <span class="green"></span>
      </div>
    </div>

    <div class="screen-container">

      <div class="screen-top-dots">
        <span></span>
        <span></span>
      </div>

      <img id="pokemonImage" class="pokemon-img">

      <h2 id="pokemonName" class="pokemon-name"></h2>

      <div id="types" class="type-container"></div>

    </div>

    <div class="controls">

      <div class="joystick"></div>

      <div class="buttons">
        <div class="small-btn red-btn"></div>
        <div class="small-btn blue-btn"></div>
      </div>

      <div class="dpad"></div>

    </div>

  </div>

  <div class="hinge"></div>

  <div class="right-panel">

    <div class="search-box">
      <input id="pokemonInput" list="pokemonList" placeholder="Enter Pokémon">
      <datalist id="pokemonList"></datalist>
      <button id="searchBtn">Search</button>
    </div>

    <div class="stats-screen">
      <div id="stats" class="stats"></div>
    </div>

    <div class="blue-grid">
      <div></div><div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div><div></div>
    </div>

  </div>

  <div class="description-screen">
    <h3>Pokédex Entry</h3>
    <p id="pokeDesc">Loading...</p>
  </div>








  


</div>

<script src="script.js"></script>
</body>
</html>
